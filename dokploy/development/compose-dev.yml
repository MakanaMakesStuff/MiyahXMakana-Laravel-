services:
  app:
    container_name: mxm-app-dev
    env_file:
      - .env
    build:
      context: ../../
      dockerfile: dokploy/development/Dockerfile.dev
      args:
        - USER_ID=${UID:-1000}
        - GROUP_ID=${GID:-1000}
    volumes:
      - ../../:/var/www
    ports:
      - "5173:5173" # THE VITE PORT
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -d /var/www/public/build"]
      interval: 5s
      timeout: 5s
      retries: 15

  db:
    container_name: mxm-db-dev
    image: postgres:latest
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    container_name: mxm-nginx-dev
    image: nginx:latest
    volumes:
      - ../../:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      app:
        condition: service_healthy
        
volumes:
  db_data: