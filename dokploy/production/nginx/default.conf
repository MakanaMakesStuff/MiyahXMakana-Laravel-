server {
    listen 80;
    server_name _; # Catch-all, or replace with your actual domain

    resolver 127.0.0.11 valid=30s;

    root /var/www/public;
    index index.php index.html;

    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # 1. Route standard web traffic (including /chat and /chat/messages) to Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 2. Route ONLY Reverb WebSocket traffic to port 8080
    location /app {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        # Keep the WebSocket open even if no one is typing
        proxy_read_timeout 60m;
        proxy_send_timeout 60m;
    }

    # Cache static assets (Vite files, images, etc.)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}