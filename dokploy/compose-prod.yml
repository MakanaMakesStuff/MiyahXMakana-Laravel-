services:
  app:
    container_name: mxm-app-prod
    env_file:
      - .env
    build:
      context: ..
      dockerfile: dokploy/Dockerfile.prod
    restart: unless-stopped
    volumes:
      - app_data:/var/www
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan env || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    container_name: mxm-db-prod
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mxm_dev
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d mxm_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    container_name: mxm-nginx-prod
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - app_data:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  db_data:
  app_data:

networks:
  default:
    name: mxm-local-network # Local bridge (No 'external: true' for local testing)