services:
  app:
    container_name: mxm-app-dev
    env_file:
      - .env
    build:
      context: ..
      dockerfile: dokploy/Dockerfile.dev
      args:
        - USER_ID=${UID:-1000}
        - GROUP_ID=${GID:-1000}
    volumes:
      - ../:/var/www
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -d /var/www/public/build"]
      interval: 5s
      timeout: 5s
      retries: 15

  db:
    container_name: mxm-db-dev
    image: postgres:latest
    environment:
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mxm_dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d mxm_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    container_name: mxm-nginx-dev
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy
volumes:
  db_data:

networks:
  default:
    name: dokploy-network
    external: true